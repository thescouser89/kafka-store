name: Build snapshot version and upload to Maven Central

permissions: {}

on:
  push:
    branches: [ "main" ]

jobs:
    call-snapshot-job:
      # testing jib image again. switch back to tag when it's part of a release
      uses: project-ncl/shared-github-actions/.github/workflows/maven-snapshot.yml@c9741478ed178150f26bc7a7d44c5103f5995615 # main
      with:
        project_name: 'project-ncl/kafka-store'
        quarkus_jib_image: true
      secrets:
        SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        QUAY_DEVEL_USERNAME: ${{ secrets.QUAY_DEVEL_USERNAME }}
        QUAY_DEVEL_PASSWORD: ${{ secrets.QUAY_DEVEL_PASSWORD }}
